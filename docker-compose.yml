services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PORT: 4100
      CLUB_OS_DEFAULT_ORG_ID: ${CLUB_OS_DEFAULT_ORG_ID:-org-default}
      CLUB_OS_AUTO_SEED: ${CLUB_OS_AUTO_SEED:-true}
    ports:
      - "${CLUB_OS_API_PORT:-4100}:4100"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - api
    environment:
      PORT: 3100
      CLUB_OS_API_BASE_URL: ${CLUB_OS_API_BASE_URL:-http://api:4100}
    ports:
      - "${CLUB_OS_WEB_PORT:-3100}:3100"
